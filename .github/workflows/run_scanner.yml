name: Run Screener Automated Sync

on:
  schedule:
    # Runs automatically at 6:00 PM IST (12:30 UTC) every single Monday through Friday
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # Allows you to trigger the script manually via the GitHub dashboard button

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set Up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Runtime Dependencies
      run: |
        pip install requests beautifulsoup4 pandas matplotlib

    - name: Execute Screener Scanner Core
      env:
        # Convert GitHub Secrets into environment variables for Python
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        SCREENER_USERNAME: ${{ secrets.SCREENER_USERNAME }}
        SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
      run: |
        # Minor Python modification to read from GitHub's system environment variables
        python -c "
import os, json
# Swap Colab userdata lookup with standard system environment reads
with open('scanner.py', 'r') as file:
    code = file.read().replace(\"userdata.get('\", \"os.environ.get('\")
exec(code)
        "

    - name: Save Updated History File Back to Repository
      run: |
        git config --global user.name 'GitHub Automation Bot'
        git config --global user.email 'actions@github.com'
        git add holdings_history.json
        git commit -m "Sync updated holding pattern tracking cache [skip ci]" || exit 0
        git push
        

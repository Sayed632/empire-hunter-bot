name: Run Screener Filter Automation

on:
  schedule:
    - cron: '30 4 * * 1-5'  # Runs Mon-Fri at 10:00 AM IST
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pyTelegramBotAPI

    - name: Execute Screener Filter Script
      env:
        SCREENER_USERNAME: ${{ secrets.SCREENER_USERNAME }}
        SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
      run: python screener_script.py
      

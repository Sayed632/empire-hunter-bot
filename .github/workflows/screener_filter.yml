name: Run Screener Filter Automation

on:
  schedule:
    - cron: '30 4 * * 1-5'  # Automatically runs Mon-Fri at 10:00 AM IST
  workflow_dispatch:        # Keeps your manual play button active

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install All Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Screener Filter Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
      run: python screener_script.py
      
